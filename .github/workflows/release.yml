name: Build Android Release AAB

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ] 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu İndir
      uses: actions/checkout@v4

    - name: Java JDK 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' 

    - name: Gradle Kurulumu
      uses: gradle/actions/setup-gradle@v3

    - name: Keystore'u Çöz
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 --decode > keystore.jks

    - name: Release AAB Oluştur
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      run: ./gradlew :composeApp:bundleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$KEY_ALIAS -Pandroid.injected.signing.key.password=$KEY_PASSWORD

    - name: Oluşan AAB'yi İndirilebilir Yap
      uses: actions/upload-artifact@v4
      with:
        name: release-aab-dosyasi
        path: composeApp/build/outputs/bundle/release/*.aab
