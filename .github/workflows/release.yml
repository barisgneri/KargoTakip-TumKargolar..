name: Kargo Takip CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Uygulama nereye yüklensin?'
        required: true
        default: 'firebase'
        type: choice
        options:
          - firebase
          - playstore

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu İndir
      uses: actions/checkout@v4

    - name: ☕ Java JDK 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' 

    - name: Gradle Kurulumu
      uses: gradle/actions/setup-gradle@v3

    - name: Keystore'u Çöz
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 --decode > keystore.jks

    - name: google-services.json Dosyasını Oluştur
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json

    - name: Release AAB Oluştur
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew :composeApp:bundleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$KEY_ALIAS -Pandroid.injected.signing.key.password=$KEY_PASSWORD

    - name: Oluşan AAB'yi İndirilebilir Yap
      uses: actions/upload-artifact@v4
      with:
        name: release-aab-dosyasi
        path: composeApp/build/outputs/bundle/release/*.aab 

    - name: AAB Dosyasının Tam Yolunu Bul
      id: find_aab
      run: |
        AAB_PATH=$(find composeApp/build/outputs/bundle/release -name "*.aab" | head -n 1)
        echo "aab_path=$AAB_PATH" >> $GITHUB_ENV

    - name: Firebase App Distribution'a Gönder
      if: github.event_name == 'push' || github.event.inputs.deploy_target == 'firebase'
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        groups: testers
        file: ${{ env.aab_path }}

    - name: Google Play Store'a Yükle
      # SADECE manuel çalıştırılıp playstore seçildiyse çalışır
      if: github.event.inputs.deploy_target == 'playstore'
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON }}
        packageName: com.barisproduction.kargo
        releaseFiles: ${{ env.aab_path }}
        track: internal
        status: completed
