name: PR Test Checks

on:
  pull_request:
    branches: [ "develop"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: ☕ Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Gradle Kurulumu
        uses: gradle/actions/setup-gradle@v3

      - name: Unit Testleri Çalıştır
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest